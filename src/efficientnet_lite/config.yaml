author: Food Classification AI
created_at: '2025-10-23T17:15:03.079296'
data:
  batch_size: 32
  blur_probability: 0.1
  brightness_range: !!python/tuple
  - 0.8
  - 1.2
  contrast_range: !!python/tuple
  - 0.8
  - 1.2
  dataset_path: ../../Food Classification dataset
  flip_probability: 0.5
  image_size: !!python/tuple
  - 224
  - 224
  num_workers: 4
  pin_memory: true
  rotation_range: 15.0
  saturation_range: !!python/tuple
  - 0.8
  - 1.2
  test_split: 0.1
  use_augmentation: true
  validation_split: 0.2
deployment:
  enable_gpu: false
  export_format: tflite
  max_batch_size: 32
  optimization_level: default
  quantization: true
  serve_model: false
  serving_port: 8000
  tflite_optimize_for_size: true
  tflite_quantize_float16: true
  tflite_quantize_int8: false
description: Food classification using EfficientNet Lite on-device model
environment: development
evaluation:
  benchmark_image_sizes:
  - !!python/tuple
    - 224
    - 224
  - !!python/tuple
    - 240
    - 240
  benchmark_samples: 100
  calculate_top_k: true
  metrics:
  - accuracy
  - precision
  - recall
  - f1_score
  save_classification_report: true
  save_confusion_matrix: true
  save_predictions: true
  top_k_values:
  - 1
  - 3
  - 5
hyperparameter:
  architectures:
  - EfficientNetB0
  - EfficientNetB1
  batch_sizes:
  - 16
  - 32
  - 64
  direction: maximize
  dropout_rates:
  - 0.1
  - 0.2
  - 0.3
  - 0.5
  learning_rates:
  - 0.01
  - 0.001
  - 0.0001
  max_trials: 20
  objective_metric: val_accuracy
  optimizers:
  - adam
  - sgd
  - rmsprop
  search_method: random
logging:
  log_dir: logs
  log_format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
  log_level: INFO
  plot_format: png
  save_evaluation_plots: true
  save_training_plots: true
  tensorboard_dir: tensorboard_logs
  use_tensorboard: true
model:
  architecture: EfficientNetB0
  dropout_rate: 0.2
  fine_tune_learning_rate: 0.0001
  freeze_base: true
  input_shape: !!python/tuple
  - 224
  - 224
  - 3
  num_classes: 34
  optimize_for_mobile: true
  pretrained_weights: imagenet
  quantization: true
  unfreeze_layers: 20
  use_batch_norm: true
  use_mixed_precision: false
project_name: food_classification_efficientnet_lite
training:
  checkpoint_frequency: 1
  checkpoint_mode: max
  checkpoint_monitor: val_accuracy
  dropout_rate: 0.2
  early_stopping_mode: min
  early_stopping_monitor: val_loss
  early_stopping_patience: 10
  epochs: 50
  learning_rate: 0.001
  loss_function: categorical_crossentropy
  lr_factor: 0.2
  lr_patience: 5
  metrics:
  - accuracy
  min_learning_rate: 1.0e-07
  optimizer: adam
  save_best_model: true
  scheduler_type: cosine_annealing
  use_early_stopping: true
  use_lr_scheduler: true
  weight_decay: 0.0001
version: 1.0.0
